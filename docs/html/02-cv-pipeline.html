<!-- TalentScan — Pipeline xử lý CV -->
<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TalentScan — Pipeline xử lý CV</title>
<script>
  (function () {
    const saved = localStorage.getItem('theme');
    const dark = saved ? saved === 'dark' : matchMedia('(prefers-color-scheme: dark)').matches;
    if (dark) document.documentElement.classList.add('dark');
  })();
</script>
<style>
  :root {
    --bg:#FAF9F5;--surface:#FFF;--surface2:#F0EEE6;--ink:#141413;--body:#3D3D3A;--muted:#87867F;
    --line:#D1CFC5;--line-soft:#E6E3DA;--clay:#D97757;--clay-soft:rgba(217,119,87,.1);
    --olive:#788C5D;--olive-soft:rgba(120,140,93,.12);
    --serif:ui-serif,Georgia,serif;--sans:system-ui,-apple-system,sans-serif;--mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  html.dark {
    --bg:#141413;--surface:#1F1F1D;--surface2:#2A2A28;--ink:#FAF9F5;--body:#D1CFC5;--muted:#87867F;
    --line:#3D3D3A;--line-soft:#2A2A28;--clay:#E48A6E;--clay-soft:rgba(228,138,110,.14);
    --olive:#9DB07C;--olive-soft:rgba(157,176,124,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--body);font-family:var(--sans);-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
  .bar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--line-soft);flex:none}
  .bar h1{font-family:var(--serif);font-weight:500;font-size:19px;color:var(--ink);letter-spacing:-.01em}
  .bar .sub{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
  .spacer{flex:1}
  .back{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--line);border-radius:999px;padding:4px 12px}
  .back:hover{color:var(--ink);border-color:var(--muted)}
  #themeT{font-family:var(--mono);font-size:10.5px;padding:5px 10px;border:1px solid var(--line);border-radius:6px;background:transparent;color:var(--muted);cursor:pointer}
  .stage{flex:1;position:relative;min-height:0}
  .stage svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* Nodes */
  .pnode{cursor:pointer}
  .pnode rect{fill:var(--surface);stroke:var(--line);stroke-width:1.5;rx:10;transition:stroke .15s}
  .pnode:hover rect{stroke:var(--muted)}
  .pnode.sel rect{stroke:var(--clay)!important;stroke-width:2}
  .pnode .t{font-family:var(--sans);font-size:13px;font-weight:600;fill:var(--ink);pointer-events:none}
  .pnode .m{font-family:var(--mono);font-size:10px;fill:var(--muted);pointer-events:none}
  .pnode.ai rect{fill:var(--clay-soft);stroke:var(--clay)}
  .pnode.sec rect{fill:var(--olive-soft);stroke:var(--olive)}
  .pnode.db rect{fill:var(--surface2)}
  /* Edges */
  .pedge{stroke:var(--muted);stroke-width:1.6;fill:none;marker-end:url(#pa)}
  .pelbl{font-family:var(--mono);font-size:9.5px;fill:var(--muted)}
  /* Animation */
  .stage.playing .pedge{opacity:.15}
  .stage.playing .pnode{opacity:.2;transition:opacity .3s}
  .stage.playing .pnode.active{opacity:1}
  .stage.playing .pnode.active rect{stroke:var(--clay);stroke-width:2;animation:pulse 1s ease-in-out infinite}
  .stage.playing .pnode.done{opacity:.7}
  .stage.playing .pnode.done rect{stroke:var(--olive)}
  .stage.playing .pedge.active{opacity:1;stroke:var(--clay);stroke-width:2.2;marker-end:url(#pa-clay);stroke-dasharray:7 5;animation:march .6s linear infinite}
  .stage.playing .pedge.done{opacity:.5;stroke:var(--olive);marker-end:url(#pa-clay)}
  @keyframes march{to{stroke-dashoffset:-12}}
  @keyframes pulse{0%,100%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 6px var(--clay))}}
  @media(prefers-reduced-motion:reduce){.stage.playing .pedge.active,.stage.playing .pnode.active rect{animation:none}}
  /* Play btn */
  #playBtn{position:absolute;top:12px;right:16px;font-family:var(--mono);font-size:11px;padding:6px 14px;border:1.5px solid var(--clay);border-radius:8px;background:transparent;color:var(--clay);cursor:pointer;z-index:5}
  #playBtn:hover{background:var(--clay);color:var(--bg)}
  #progress{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:11px;color:var(--clay);background:var(--surface);border:1px solid var(--line);border-radius:6px;padding:5px 14px;display:none;z-index:5}
  .stage.playing #progress{display:block}
  /* Detail */
  .detail{position:absolute;right:16px;bottom:16px;width:320px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:0 6px 24px rgba(0,0,0,.08);display:none}
  .detail.on{display:block}
  .detail h3{font-family:var(--serif);font-size:16px;font-weight:500;color:var(--ink);margin-bottom:2px}
  .detail .meta{font-family:var(--mono);font-size:10px;color:var(--muted);margin-bottom:8px}
  .detail p{font-size:12.5px;line-height:1.55}
  .detail code{font-family:var(--mono);font-size:11px;color:var(--clay)}
  /* Metrics bar */
  .metrics-bar{position:absolute;left:16px;bottom:16px;display:flex;gap:16px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 16px}
  .mb-item .val{font-family:var(--serif);font-size:20px;font-weight:500;color:var(--clay)}
  .mb-item .lbl{font-family:var(--mono);font-size:9px;text-transform:uppercase;color:var(--muted)}
  @media(max-width:880px){body{overflow:auto}.stage{min-height:70vh}.detail,.metrics-bar{position:static;width:auto;margin:10px 16px}}
</style>
</head>
<body>
<div class="bar">
  <div><h1>Pipeline xử lý CV</h1><div class="sub">upload → extract → pii → parse → embed → match</div></div>
  <div class="spacer"></div>
  <a href="index.html" class="back">← Docs</a>
  <button id="themeT">◑</button>
</div>
<div class="stage" id="stage">
<button id="playBtn">▶ Play Pipeline</button>
<div id="progress"></div>
<svg viewBox="0 0 1200 600" preserveAspectRatio="xMidYMid meet">
<defs>
  <marker id="pa" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--muted)"/></marker>
  <marker id="pa-clay" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="var(--clay)"/></marker>
</defs>

<!-- Step 1: Upload -->
<g class="pnode" data-step="upload"><rect x="40" y="250" width="130" height="60"/><text class="t" x="105" y="276" text-anchor="middle">Upload</text><text class="m" x="105" y="294" text-anchor="middle">PDF</text></g>

<!-- Step 2: Extract -->
<g class="pnode" data-step="extract"><rect x="220" y="250" width="130" height="60"/><text class="t" x="285" y="276" text-anchor="middle">Extract Text</text><text class="m" x="285" y="294" text-anchor="middle">PyMuPDF</text></g>

<!-- Step 3: PII -->
<g class="pnode sec" data-step="pii"><rect x="400" y="250" width="130" height="60"/><text class="t" x="465" y="276" text-anchor="middle">PII Filter</text><text class="m" x="465" y="294" text-anchor="middle">6 regex patterns</text></g>

<!-- Step 4: Guard -->
<g class="pnode sec" data-step="guard"><rect x="400" y="160" width="130" height="60"/><text class="t" x="465" y="186" text-anchor="middle">Injection Guard</text><text class="m" x="465" y="204" text-anchor="middle">11 patterns + XML</text></g>

<!-- Step 5: AI Parse -->
<g class="pnode ai" data-step="parse"><rect x="580" y="250" width="150" height="60"/><text class="t" x="655" y="276" text-anchor="middle">Claude Haiku Parse</text><text class="m" x="655" y="294" text-anchor="middle">~3s · $0.002</text></g>

<!-- Step 6: Embed -->
<g class="pnode ai" data-step="embed"><rect x="780" y="250" width="150" height="60"/><text class="t" x="855" y="276" text-anchor="middle">Titan Embed V2</text><text class="m" x="855" y="294" text-anchor="middle">1024-dim · $0.00004</text></g>

<!-- Step 7: Match -->
<g class="pnode ai" data-step="match"><rect x="980" y="250" width="150" height="60"/><text class="t" x="1055" y="276" text-anchor="middle">Smart Pool</text><text class="m" x="1055" y="294" text-anchor="middle">auto-match all jobs</text></g>

<!-- OCR fallback -->
<g class="pnode ai" data-step="ocr"><rect x="220" y="380" width="130" height="60"/><text class="t" x="285" y="406" text-anchor="middle">OCR Vision</text><text class="m" x="285" y="424" text-anchor="middle">Sonnet · scanned</text></g>

<!-- File Storage -->
<g class="pnode db" data-step="files"><rect x="580" y="380" width="130" height="60"/><text class="t" x="645" y="406" text-anchor="middle">File Storage</text><text class="m" x="645" y="424" text-anchor="middle">uploads/cv</text></g>

<!-- PostgreSQL -->
<g class="pnode db" data-step="pg"><rect x="980" y="380" width="150" height="60"/><text class="t" x="1055" y="406" text-anchor="middle">PostgreSQL</text><text class="m" x="1055" y="424" text-anchor="middle">candidates + vectors</text></g>

<!-- Edges (main flow) -->
<path class="pedge" d="M170,280 L220,280"/>
<path class="pedge" d="M350,280 L400,280"/>
<path class="pedge" d="M465,250 L465,220"/>
<path class="pedge" d="M530,280 L580,280"/>
<path class="pedge" d="M730,280 L780,280"/>
<path class="pedge" d="M930,280 L980,280"/>

<!-- Edges (secondary) -->
<path class="pedge" d="M285,310 L285,380" style="stroke-dasharray:4 3"/>
<text class="pelbl" x="290" y="350">&lt;50 chars</text>
<path class="pedge" d="M655,310 L645,380"/>
<text class="pelbl" x="660" y="350">save file</text>
<path class="pedge" d="M1055,310 L1055,380"/>
<text class="pelbl" x="1065" y="350">save data</text>
</svg>

<div class="detail" id="detail"></div>
<div class="metrics-bar">
  <div class="mb-item"><div class="val">~3s</div><div class="lbl">Per CV</div></div>
  <div class="mb-item"><div class="val">~100s</div><div class="lbl">50 CVs batch</div></div>
  <div class="mb-item"><div class="val">100%</div><div class="lbl">Completion</div></div>
  <div class="mb-item"><div class="val">6</div><div class="lbl">PII types</div></div>
</div>
</div>

<script>
(function(){
  const info = {
    upload:{title:'Upload',meta:'POST /api/cv-upload · /api/cv-batch',desc:'Nhận PDF (max 10MB). Batch 200 files. MD5 hash dedup — CV trùng bị reject ngay. WebSocket push progress.'},
    extract:{title:'Extract Text',meta:'extractor.py · PyMuPDF',desc:'PDF → fitz text extraction. Lọc white fonting (text ẩn). Nếu text <50 chars → fallback OCR Vision.'},
    pii:{title:'PII Filter',meta:'pii_filter.py · 6 regex patterns',desc:'Ẩn danh: email→[EMAIL], phone→[PHONE], CCCD→[CCCD], DOB→[DOB], URL→[URL], address→[ADDRESS]. AI không thấy PII thật.'},
    guard:{title:'Injection Guard',meta:'injection_guard.py · 53 patterns',desc:'Detect prompt injection (ignore instructions, DAN mode, system override, Vietnamese injection, delimiter attacks...). XML delimiter wrapping + leet speak detection.'},
    parse:{title:'Claude Haiku Parse',meta:'bedrock.py · ~3s · ~$0.002/call',desc:'Trích xuất structured JSON: name, skills, experience, education, languages. Retry 3× exponential backoff.'},
    embed:{title:'Titan Embed V2',meta:'bedrock.py · ~0.5s · ~$0.00004',desc:'Generate 1024-dim vector từ skills + experience. Lưu vào candidates.embedding (pgvector column).'},
    match:{title:'Smart Pool',meta:'smart_pool.py · pgvector cosine',desc:'Match candidate vs tất cả jobs. Combined = cosine×30% + skill_overlap×70%. Lưu vào job_candidates.'},
    ocr:{title:'OCR Vision',meta:'Claude Sonnet · ~5s · ~$0.01',desc:'Fallback cho scanned PDF (text <50 chars). Claude Sonnet vision đọc ảnh pages, trả về plain text.'},
    files:{title:'File Storage',meta:'Docker volume · uploads/cv',desc:'Lưu file gốc PDF. Path stored in candidates.cv_file_path. Dùng cho CV Authenticity Check sau này.'},
    pg:{title:'PostgreSQL 16',meta:':5432 · pgvector',desc:'Lưu structured_data (JSONB), embedding (Vector 1024), match scores, classification.'}
  };

  // Pipeline sequence — edge indices match SVG order
  // Edges: 0=Upload→Extract, 1=Extract→PII, 2=PII↑Guard, 3=PII→Parse, 4=Parse→Embed, 5=Embed→Match, 6=Extract↓OCR, 7=Parse↓Files, 8=Match↓PG
  const sequence = [
    {node:'upload', label:'Step 1 — Upload CV', edge:0},
    {node:'extract', label:'Step 2 — Extract Text', edge:6},
    {node:'ocr', label:'Step 3 — OCR (nếu scanned)', edge:1},
    {node:'pii', label:'Step 4 — PII Filter', edge:2},
    {node:'guard', label:'Step 5 — Injection Guard', edge:3},
    {node:'parse', label:'Step 6 — Claude Haiku Parse', edge:7},
    {node:'files', label:'Step 7 — Save File', edge:4},
    {node:'embed', label:'Step 8 — Titan Embed', edge:5},
    {node:'match', label:'Step 9 — Smart Pool Match', edge:8},
    {node:'pg', label:'Step 10 — Save to PostgreSQL', edge:null},
  ];

  const nodes = document.querySelectorAll('.pnode');
  const edges = Array.from(document.querySelectorAll('.pedge'));
  const detail = document.getElementById('detail');
  const progress = document.getElementById('progress');
  const stage = document.getElementById('stage');
  const playBtn = document.getElementById('playBtn');
  let animTimer = null;
  let playing = false;

  // Click detail
  nodes.forEach(n => {
    n.addEventListener('click', function(){
      nodes.forEach(x=>x.classList.remove('sel'));
      this.classList.add('sel');
      const d = info[this.dataset.step];
      if(d){detail.innerHTML=`<h3>${d.title}</h3><div class="meta">${d.meta}</div><p>${d.desc}</p>`;detail.classList.add('on')}
    });
  });

  function resetAnim(){
    nodes.forEach(n=>{n.classList.remove('active','done')});
    edges.forEach(e=>{e.classList.remove('active','done')});
    progress.textContent='';
  }

  function runStep(idx){
    if(!playing) return;
    if(idx >= sequence.length){
      // Loop: brief pause then restart
      setTimeout(()=>{
        if(!playing) return;
        resetAnim();
        setTimeout(()=>runStep(0), 400);
      }, 1500);
      return;
    }
    const step = sequence[idx];
    // Mark previous as done
    if(idx > 0){
      const prev = sequence[idx-1];
      const prevNode = document.querySelector(`.pnode[data-step="${prev.node}"]`);
      if(prevNode){prevNode.classList.remove('active');prevNode.classList.add('done')}
      if(prev.edge !== null && edges[prev.edge]){edges[prev.edge].classList.remove('active');edges[prev.edge].classList.add('done')}
    }
    // Activate current
    const curNode = document.querySelector(`.pnode[data-step="${step.node}"]`);
    if(curNode) curNode.classList.add('active');
    if(step.edge !== null && edges[step.edge]) edges[step.edge].classList.add('active');
    progress.textContent = step.label;

    // Show detail
    const d = info[step.node];
    if(d){detail.innerHTML=`<h3>${d.title}</h3><div class="meta">${d.meta}</div><p>${d.desc}</p>`;detail.classList.add('on')}

    animTimer = setTimeout(()=>runStep(idx+1), 1200);
  }

  playBtn.addEventListener('click', function(){
    if(playing){
      playing = false;
      clearTimeout(animTimer);
      stage.classList.remove('playing');
      resetAnim();
      detail.classList.remove('on');
      this.textContent = '▶ Play Pipeline';
    } else {
      playing = true;
      stage.classList.add('playing');
      resetAnim();
      this.textContent = '■ Stop';
      runStep(0);
    }
  });

  document.getElementById('themeT').onclick=()=>{document.documentElement.classList.toggle('dark');localStorage.setItem('theme',document.documentElement.classList.contains('dark')?'dark':'light')};
})();
</script>
</body>
</html>
