services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: talent
      POSTGRES_PASSWORD: talent
      POSTGRES_DB: talentscan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talent -d talentscan"]
      interval: 5s
      retries: 5

  api:
    build: ./server
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server:/app

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api

volumes:
  pgdata:
